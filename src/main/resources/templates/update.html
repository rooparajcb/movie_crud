<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Update Movie</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: url('https://images.unsplash.com/photo-1504384308090-c894fdcc538d') center/cover no-repeat;
      backdrop-filter: blur(6px);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 30px 40px;
      max-width: 400px;
      width: 90%;
    }
    .btn-custom {
      background-color: #00adb5;
      color: white;
      border: none;
    }
    .btn-custom:hover {
      background-color: #019ca4;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-transparent mb-4 position-absolute top-0 w-100">
    <div class="container">
      <a class="navbar-brand fw-bold text-info" href="/">🎬 MovieDB</a>
      <div>
        <a href="/" class="btn btn-outline-info me-2">🏠 Home</a>
        <a href="/insert" class="btn btn-outline-info me-2">➕ Add Movie</a>
        <a href="/fetch" class="btn btn-outline-info">🎞 View Movies</a>
      </div>
    </div>
  </nav>

  <div class="glass-card text-center mt-5">
    <h2 class="text-info mb-3">✏️ Update Movie</h2>
    <form action="/update" method="post">
      <input type="hidden" name="id" th:value="${movie.id}">
      <div class="mb-3">
        <input type="text" name="name" class="form-control" placeholder="Movie Name" th:value="${movie.name}" required>
      </div>
      <div class="mb-3">
        <input type="text" name="description" class="form-control" placeholder="Description" th:value="${movie.description}" required>
      </div>
      <div class="mb-3">
        <input type="text" name="imageLink" class="form-control" placeholder="Image Link" th:value="${movie.imageLink}" required>
      </div>
      <div class="mb-3">
        <input type="text" name="trailerLink" class="form-control" placeholder="Trailer Link" th:value="${movie.trailerLink}" required>
      </div>
      <div class="mb-3">
        <input type="text" name="genre" class="form-control" placeholder="Genre" th:value="${movie.genre}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Rating:</label><br>
        <div class="d-flex justify-content-center gap-3">
          <div th:each="num : ${#numbers.sequence(1,5)}">
            <input type="radio" name="rating" th:value="${num}"> <span th:text="${num}"></span>
          </div>
        </div>
      </div>
      <button class="btn btn-custom w-100">Update</button>
    </form>
  </div>
</body>
</html>
