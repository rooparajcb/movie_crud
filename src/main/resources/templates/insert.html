<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Movie</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#1f3c4d,#3a7ca5);
color:white;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-family:Segoe UI;
}

/* Glass Card */
.glass-card{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
border-radius:18px;
border:1px solid rgba(255,255,255,0.25);
padding:30px 40px;
width:90%;
max-width:420px;
box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

/* Inputs */
.form-control{
background:rgba(255,255,255,0.2);
border:none;
color:white;
border-radius:10px;
}

.form-control::placeholder{
color:#ddd;
}

.form-control:focus{
box-shadow:0 0 10px rgba(0,173,181,0.6);
}

/* Button */
.btn-custom{
background:linear-gradient(135deg,#00c6ff,#0072ff);
color:white;
border:none;
border-radius:10px;
font-weight:500;
}

.btn-custom:hover{
background:linear-gradient(135deg,#0096c7,#005bea);
}

/* Navbar */
.navbar{
background:rgba(0,0,0,0.2);
backdrop-filter:blur(10px);
}

.navbar-brand{
color:#00eaff !important;
font-size:22px;
}

.btn-outline-info{
border-color:#00eaff;
color:#00eaff;
}

.btn-outline-info:hover{
background:#00eaff;
color:black;
}

/* Heading */
h2{
color:#00eaff;
}

label{
color:#eee;
}

</style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg mb-4 position-absolute top-0 w-100">
<div class="container">

<a class="navbar-brand fw-bold" href="/">🎬 MovieDB</a>

<div>
<a href="/" class="btn btn-outline-info me-2">🏠 Home</a>
<a href="/insert" class="btn btn-outline-info me-2">➕ Add Movie</a>
<a href="/fetch" class="btn btn-outline-info">🎞 View Movies</a>
</div>

</div>
</nav>

<!-- Form -->
<div class="glass-card text-center mt-5">

<h2 class="mb-3">➕ Add New Movie</h2>

<form action="/insert" method="post">

<input type="text" name="name" class="form-control mb-3" placeholder="Movie Name" required>

<input type="text" name="description" class="form-control mb-3" placeholder="Description" required>

<input type="text" name="imageLink" class="form-control mb-3" placeholder="Image Link" required>

<input type="text" name="trailerLink" class="form-control mb-3" placeholder="Trailer Link" required>

<input type="text" name="genre" class="form-control mb-3" placeholder="Genre" required>

<label class="form-label">Rating:</label>

<div class="d-flex justify-content-center gap-3 mb-3">

<div th:each="num : ${#numbers.sequence(1,5)}">
<input type="radio" name="rating" th:value="${num}">
<span th:text="${num}"></span>
</div>

</div>

<button class="btn btn-custom w-100">Add Movie</button>

</form>

</div>

</body>
</html>
