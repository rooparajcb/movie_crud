<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Movie CRUD</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: url('https://images.unsplash.com/photo-1606813902371-22f259e3cc58') center/cover no-repeat;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Poppins', sans-serif;
      color: white;
    }
    .glass-box {
      backdrop-filter: blur(15px);
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      padding: 50px;
      text-align: center;
    }
    .btn-custom {
      background-color: #00adb5;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 25px;
      margin: 10px;
      transition: 0.3s;
    }
    .btn-custom:hover {
      background-color: #007b83;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="glass-box">
    <h1 class="mb-4 text-info fw-bold">🎬 Movie Database</h1>
    <a href="/insert" class="btn btn-custom">Insert Record</a>
    <a href="/fetch" class="btn btn-custom">Fetch Records</a>
  </div>
</body>
</html>
