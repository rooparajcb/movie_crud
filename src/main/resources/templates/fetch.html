<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Movie Records</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: url('https://images.unsplash.com/photo-1504384308090-c894fdcc538d') center/cover no-repeat;
      color: white;
      min-height: 100vh;
      padding-top: 100px;
    }
    .glass-table {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 20px;
    }
    .btn-custom {
      background-color: #00adb5;
      color: white;
      border: none;
    }
    .btn-custom:hover {
      background-color: #019ca4;
    }
    table th {
      background-color: rgba(0, 173, 181, 0.8);
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-transparent position-fixed top-0 w-100">
    <div class="container">
      <a class="navbar-brand fw-bold text-info" href="/">🎬 MovieDB</a>
      <div>
        <a href="/" class="btn btn-outline-info me-2">🏠 Home</a>
        <a href="/insert" class="btn btn-outline-info me-2">➕ Add Movie</a>
        <a href="/fetch" class="btn btn-outline-info">🎞 View Movies</a>
      </div>
    </div>
  </nav>

  <div class="container glass-table mt-5 p-4 text-center">
    <h2 class="text-info mb-3">🎥 Movie Records</h2>
    <div class="table-responsive">
      <table class="table table-bordered text-white align-middle">
        <thead>
          <tr>
            <th>Name</th>
            <th>Description</th>
            <th>Genre</th>
            <th>Image</th>
            <th>Trailer</th>
            <th>Ratings</th>
            <th>Delete</th>
            <th>Update</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="movie:${movies}">
            <td th:text="${movie.name}"></td>
            <td th:text="${movie.description}"></td>
            <td th:text="${movie.genre}"></td>
            <td><img th:src="${movie.imageLink}" width="100" height="100" class="rounded"></td>
            <td><a th:href="${movie.trailerLink}" target="_blank" class="btn btn-sm btn-custom">Watch</a></td>
            <td th:text="${movie.rating}"></td>
            <td><a th:href="'/delete?id='+${movie.id}" class="btn btn-sm btn-danger">Delete</a></td>
            <td><a th:href="'/update?id='+${movie.id}" class="btn btn-sm btn-warning">Edit</a></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
